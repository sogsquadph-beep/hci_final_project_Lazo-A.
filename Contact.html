<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Andrei's Basketball Shop</title>
    <link rel="stylesheet" href="style.css">

    <!-- FONT AWESOME (ICONS) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<nav>
    <a href="Home.html">Home</a>
    <a href="Products.html">Product</a>
    <a href="About.html">About Us</a>
    <a href="Contact.html">Contact Us</a>
</nav>

<section class="contact">
    <h1>Contact Us</h1>

    <!-- SOCIAL MEDIA -->
    <div class="socials">
        <h3>Follow Us</h3>

        <p>
            <a href="#">
                <i class="fab fa-facebook"></i> Facebook: Andrei's Basketball Shop
            </a>
        </p>

        <p>
            <a href="#">
                <i class="fab fa-instagram"></i> Instagram: Andrei's Basketball Shop
            </a>
        </p>

        <p>
            <a href="#">
                <i class="fab fa-tiktok"></i> TikTok: Andrei's Basketball Shop
            </a>
        </p>
    </div>

    <!-- LOCATION -->
    <div class="location">
        <h3>Our Location</h3>
        <p>Palanginan, Iba, Zambales</p>
    </div>

    <!-- CONTACT FORM -->
    <div class="form">
        <h3>Send us a message</h3>
        <form>
            <input type="text" placeholder="Your Name" required><br><br>
            <input type="email" placeholder="Your Email" required><br><br>
            <textarea placeholder="Your Message" rows="5" required></textarea><br><br>
            <button type="submit">Send Message</button>
        </form>
    </div>

</section>

</body>
</html>
